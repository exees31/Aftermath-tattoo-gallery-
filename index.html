<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aftermath Tattoo Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,900&family=Bebas+Neue&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #e8157a;
    --cyan: #00c8e0;
    --dark: #080808;
    --dark2: #111111;
    --dark3: #1a1a1a;
    --off-white: #f0ede8;
    --muted: #888;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--off-white);
    font-family: 'Crimson Text', Georgia, serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    width: 12px; height: 12px;
    background: var(--pink);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    transition: transform 0.1s, background 0.2s;
    mix-blend-mode: screen;
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border: 1px solid var(--cyan);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%,-50%);
    transition: transform 0.15s ease, width 0.2s, height 0.2s, background-color 0.2s;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 3rem;
    background: linear-gradient(to bottom, rgba(8,8,8,0.95), transparent);
    backdrop-filter: blur(2px);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 0.8rem;
    text-decoration: none;
    cursor: none;
  }
  .nav-logo img {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid var(--pink);
    object-fit: cover;
    box-shadow: 0 0 16px rgba(232,21,122,0.5);
  }
  .nav-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    color: var(--off-white);
  }
  .nav-links {
    display: flex; gap: 2.5rem; list-style: none;
  }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-family: 'Crimson Text', serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    transition: color 0.2s;
    text-transform: uppercase;
    cursor: none;
  }
  .nav-links a:hover { color: var(--cyan); }
  .nav-book {
    background: transparent;
    border: 1px solid var(--pink);
    color: var(--pink);
    padding: 0.5rem 1.4rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    cursor: none;
    transition: all 0.25s;
    text-decoration: none;
  }
  .nav-book:hover {
    background: var(--pink);
    color: var(--dark);
    box-shadow: 0 0 20px rgba(232,21,122,0.5);
  }

  /* HERO */
  #hero {
    min-height: 100vh;
    position: relative;
    display: flex; align-items: flex-end;
    overflow: hidden;
    padding-bottom: 6rem;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 40%, rgba(0,200,224,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(232,21,122,0.08) 0%, transparent 50%),
                var(--dark);
  }
  /* Noise grain overlay */
  .hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.3;
    pointer-events: none;
  }
  .hero-image-right {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 55%;
    overflow: hidden;
  }
  .hero-image-right img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    opacity: 0.5;
    mask-image: linear-gradient(to left, rgba(0,0,0,0.8) 40%, transparent 100%);
    -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.8) 40%, transparent 100%);
  }
  .hero-content {
    position: relative; z-index: 2;
    padding: 0 3rem 0 4rem;
    max-width: 700px;
    animation: fadeUp 1.2s ease both;
  }
  .hero-eyebrow {
    font-family: 'Crimson Text', serif;
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .hero-eyebrow::before {
    content: '';
    width: 40px; height: 1px;
    background: var(--cyan);
    display: inline-block;
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 12vw, 11rem);
    line-height: 0.88;
    letter-spacing: -0.02em;
    color: var(--off-white);
    margin-bottom: 0.3rem;
  }
  .hero-title span {
    display: block;
    -webkit-text-stroke: 1px var(--pink);
    color: transparent;
  }
  .hero-title span.filled {
    color: var(--off-white);
    -webkit-text-stroke: 0;
  }
  .hero-sub {
    font-size: 1.25rem;
    color: var(--muted);
    font-style: italic;
    margin: 1.5rem 0 2.5rem;
    max-width: 420px;
    line-height: 1.6;
  }
  .hero-cta {
    display: inline-flex; align-items: center; gap: 0.8rem;
    background: var(--pink);
    color: var(--dark);
    padding: 1rem 2.2rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.2em;
    text-decoration: none;
    cursor: none;
    transition: all 0.3s;
    box-shadow: 0 0 30px rgba(232,21,122,0.4);
  }
  .hero-cta:hover {
    background: var(--cyan);
    box-shadow: 0 0 30px rgba(0,200,224,0.5);
  }
  .hero-scroll {
    position: absolute; bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 0.7rem; letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: bounce 2s infinite;
  }
  .hero-scroll::after {
    content: '';
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--muted), transparent);
  }

  /* ABOUT */
  #about {
    padding: 8rem 4rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6rem;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
  }
  .about-left .section-label {
    font-family: 'Crimson Text', serif;
    font-size: 0.8rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 1.5rem;
  }
  .about-heading {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 4vw, 3.8rem);
    line-height: 1.1;
    margin-bottom: 2rem;
    font-style: italic;
  }
  .about-heading strong {
    font-style: normal;
    color: var(--cyan);
  }
  .about-body {
    font-size: 1.15rem;
    line-height: 1.8;
    color: #aaa;
    margin-bottom: 2rem;
  }
  .about-license {
    display: inline-flex; align-items: center; gap: 0.6rem;
    border: 1px solid var(--dark3);
    padding: 0.6rem 1.2rem;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .about-license span { color: var(--cyan); }
  .about-right {
    position: relative;
  }
  .about-logo-wrap {
    display: flex; justify-content: center; align-items: center;
    position: relative;
  }
  .about-logo-wrap::before {
    content: '';
    position: absolute;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,21,122,0.12) 0%, transparent 70%);
    animation: pulse 3s ease-in-out infinite;
  }
  .about-logo {
    width: 300px; height: 300px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(232,21,122,0.4);
    box-shadow: 0 0 60px rgba(232,21,122,0.2), inset 0 0 60px rgba(0,0,0,0.5);
  }

  /* GALLERY */
  #gallery {
    padding: 6rem 0;
    overflow: hidden;
  }
  .section-header {
    padding: 0 4rem;
    margin-bottom: 3rem;
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .section-header-left .section-label {
    font-size: 0.8rem; letter-spacing: 0.4em;
    text-transform: uppercase; color: var(--pink);
    margin-bottom: 0.8rem;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 6vw, 5.5rem);
    line-height: 0.9;
    letter-spacing: 0.02em;
  }
  .section-title .outline {
    -webkit-text-stroke: 1px var(--cyan);
    color: transparent;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: auto;
    gap: 6px;
    padding: 0 2rem;
  }
  .gallery-item {
    overflow: hidden;
    position: relative;
    cursor: none;
  }
  .gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s;
    filter: saturate(0.85);
  }
  .gallery-item:hover img {
    transform: scale(1.06);
    filter: saturate(1.2);
  }
  .gallery-item::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(232,21,122,0.3) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .gallery-item:hover::after { opacity: 1; }

  .g1 { grid-column: 1/6; grid-row: 1; height: 500px; }
  .g2 { grid-column: 6/9; grid-row: 1; height: 500px; }
  .g3 { grid-column: 9/13; grid-row: 1; height: 500px; }
  .g4 { grid-column: 1/4; grid-row: 2; height: 420px; }
  .g5 { grid-column: 4/8; grid-row: 2; height: 420px; }
  .g6 { grid-column: 8/10; grid-row: 2; height: 420px; }
  .g7 { grid-column: 10/13; grid-row: 2; height: 420px; }
  .g8 { grid-column: 1/5; grid-row: 3; height: 380px; }
  .g9 { grid-column: 5/13; grid-row: 3; height: 380px; }

  /* ARTISTS */
  #artists {
    padding: 8rem 4rem;
    background: var(--dark2);
    position: relative;
    overflow: hidden;
  }
  #artists::before {
    content: 'ARTISTS';
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20vw;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.03);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    white-space: nowrap;
  }
  .artists-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 2rem;
    margin-top: 4rem;
    position: relative; z-index: 1;
  }
  .artist-card {
    border: 1px solid var(--dark3);
    padding: 2.5rem 2rem;
    position: relative;
    transition: border-color 0.3s, transform 0.3s;
    overflow: hidden;
    background: var(--dark);
  }
  .artist-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, var(--pink), var(--cyan));
    transform: scaleX(0);
    transition: transform 0.4s;
    transform-origin: left;
  }
  .artist-card:hover::before { transform: scaleX(1); }
  .artist-card:hover {
    border-color: rgba(232,21,122,0.3);
    transform: translateY(-4px);
  }
  .artist-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.08);
    position: absolute;
    top: 1rem; right: 1.5rem;
    line-height: 1;
  }
  .artist-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
    font-style: italic;
  }
  .artist-handle {
    color: var(--pink);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }
  .artist-specialty {
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.6;
  }
  .artist-tag {
    display: inline-block;
    margin-top: 1.2rem;
    padding: 0.3rem 0.8rem;
    border: 1px solid var(--dark3);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--cyan);
    text-transform: uppercase;
  }

  /* BOOKING */
  #booking {
    padding: 8rem 4rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .booking-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(232,21,122,0.08) 0%, transparent 60%);
  }
  .booking-content { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
  .booking-eyebrow {
    font-size: 0.8rem; letter-spacing: 0.4em;
    text-transform: uppercase; color: var(--cyan);
    margin-bottom: 1.5rem;
  }
  .booking-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-style: italic;
    line-height: 1.15;
    margin-bottom: 1.5rem;
  }
  .booking-title em {
    color: var(--pink);
    font-style: normal;
  }
  .booking-sub {
    color: var(--muted);
    font-size: 1.15rem;
    line-height: 1.7;
    margin-bottom: 3rem;
  }
  .booking-btn {
    display: inline-flex; align-items: center; gap: 1rem;
    background: var(--pink);
    color: var(--dark);
    padding: 1.2rem 3rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    text-decoration: none;
    cursor: none;
    transition: all 0.3s;
    box-shadow: 0 0 40px rgba(232,21,122,0.3);
  }
  .booking-btn:hover {
    background: var(--cyan);
    box-shadow: 0 0 40px rgba(0,200,224,0.4);
    transform: translateY(-2px);
  }
  .booking-refer {
    margin-top: 2.5rem;
    padding: 1.5rem 2rem;
    border: 1px solid rgba(0,200,224,0.2);
    display: inline-block;
    font-size: 1rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .booking-refer strong { color: var(--cyan); }

  /* FAQ */
  #faq {
    padding: 8rem 4rem;
    background: var(--dark2);
    max-width: 100%;
  }
  .faq-inner {
    max-width: 860px;
    margin: 0 auto;
  }
  .faq-list {
    margin-top: 4rem;
  }
  .faq-item {
    border-bottom: 1px solid var(--dark3);
    overflow: hidden;
  }
  .faq-question {
    width: 100%;
    background: none;
    border: none;
    color: var(--off-white);
    text-align: left;
    padding: 1.8rem 0;
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    cursor: none;
    display: flex; justify-content: space-between; align-items: center;
    gap: 1rem;
    transition: color 0.2s;
  }
  .faq-question:hover { color: var(--pink); }
  .faq-icon {
    width: 28px; height: 28px; min-width: 28px;
    border: 1px solid var(--dark3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    color: var(--cyan);
    transition: transform 0.3s, background 0.3s;
  }
  .faq-item.open .faq-icon {
    transform: rotate(45deg);
    background: var(--pink);
    border-color: var(--pink);
    color: var(--dark);
  }
  .faq-answer {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    color: var(--muted);
    font-size: 1.05rem;
    line-height: 1.8;
  }
  .faq-answer p { padding-bottom: 1.8rem; }
  .faq-item.open .faq-answer { max-height: 300px; }

  /* FUN FACTS */
  #funfacts {
    padding: 8rem 4rem;
    position: relative;
    overflow: hidden;
  }
  .facts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    margin-top: 4rem;
  }
  .fact-card {
    padding: 2.5rem;
    border: 1px solid var(--dark3);
    position: relative;
    overflow: hidden;
    transition: transform 0.3s, border-color 0.3s;
    background: var(--dark2);
  }
  .fact-card:hover {
    transform: translateY(-5px);
    border-color: var(--pink);
  }
  .fact-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    line-height: 1;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--pink), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .fact-text {
    font-size: 1rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .fact-text strong { color: var(--off-white); }
  .fact-icon {
    position: absolute; bottom: 1.5rem; right: 1.5rem;
    font-size: 2.5rem;
    opacity: 0.12;
  }

  /* FOOTER */
  footer {
    background: #040404;
    padding: 4rem;
    border-top: 1px solid var(--dark3);
  }
  .footer-inner {
    max-width: 1200px; margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 3rem;
    margin-bottom: 3rem;
  }
  .footer-brand {
    display: flex; flex-direction: column; gap: 1rem;
  }
  .footer-logo {
    width: 70px; height: 70px;
    border-radius: 50%;
    border: 1px solid rgba(232,21,122,0.3);
    object-fit: cover;
  }
  .footer-tagline {
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.6;
    font-style: italic;
  }
  .footer-col h4 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: var(--cyan);
    margin-bottom: 1.2rem;
  }
  .footer-col ul { list-style: none; }
  .footer-col ul li {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 0.6rem;
  }
  .footer-col ul li a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
    cursor: none;
  }
  .footer-col ul li a:hover { color: var(--pink); }
  .footer-bottom {
    border-top: 1px solid var(--dark3);
    padding-top: 2rem;
    display: flex; justify-content: space-between; align-items: center;
    color: #444;
    font-size: 0.85rem;
  }
  .footer-bottom a { color: var(--pink); text-decoration: none; cursor: none; }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.7; }
  }
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(8px); }
  }

  /* Scroll reveal */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Divider line */
  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(to right, var(--pink), var(--cyan));
    margin: 1.5rem 0;
  }

  /* Mobile */
  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
    #about { grid-template-columns: 1fr; padding: 5rem 2rem; gap: 3rem; }
    .about-right { order: -1; }
    #gallery { padding: 4rem 0; }
    .section-header { padding: 0 1.5rem; }
    .gallery-grid {
      grid-template-columns: 1fr 1fr;
      padding: 0 1rem;
    }
    .g1,.g2,.g3,.g4,.g5,.g6,.g7,.g8,.g9 {
      grid-column: auto; grid-row: auto; height: 220px;
    }
    #artists { padding: 5rem 2rem; }
    #booking { padding: 5rem 2rem; }
    #faq { padding: 5rem 2rem; }
    #funfacts { padding: 5rem 2rem; }
    footer { padding: 3rem 2rem; }
    .footer-inner { grid-template-columns: 1fr; gap: 2rem; }
    .footer-bottom { flex-direction: column; gap: 1rem; text-align: center; }
    .hero-content { padding: 0 2rem; }
    .hero-image-right { width: 100%; opacity: 0.2; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- NAV -->
